<!DOCTYPE html>
<html>
<head>
    <title>JobShield - Fake Job Detector</title>

    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(to right, #667eea, #764ba2);
            height: 100vh;
        }
        .card {
            margin-top: 100px;
            border-radius: 15px;
        }
        #result {
            font-weight: bold;
            font-size: 18px;
        }
    </style>
</head>
<body>

<div class="container text-center">
    <div class="card p-4 shadow">
        <h2>🛡️ JobShield</h2>
        <p>Detect Fake Job Links Easily</p>

        <input type="text" id="jobLink" class="form-control" placeholder="Enter job link">

        <button class="btn btn-primary mt-3" onclick="checkJob()">Check Job</button>

        <p id="result" class="mt-3"></p>
    </div>
</div>

function checkJob() {
    let link = document.getElementById("jobLink").value;

    fetch("http://localhost:8081/check", {
        method: "POST",
        headers: {
            "Content-Type": "text/plain"
        },
        body: link
    })
    .then(response => response.text())
    .then(data => {
        let result = document.getElementById("result");
        result.innerText = data;

        if(data.includes("Fake")) {
            result.style.color = "red";
        } else if(data.includes("Suspicious")) {
            result.style.color = "orange";
        } else {
            result.style.color = "green";
        }
    });
}
</script>

</body>
